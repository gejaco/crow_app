<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>C++ vs Python Benchmark</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      background: #f8fafc;
      color: #1e293b;
    }
    h1 {
      text-align: center;
      color: #1e40af;
    }
    button {
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      color: white;
      border: none;
      padding: 12px 32px;
      font-size: 16px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      transition: all 0.2s;
      margin: 1rem auto;
      display: block;
    }
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .status {
      text-align: center;
      margin: 2rem 0;
      font-size: 18px;
      padding: 1rem;
      background: #eff6ff;
      border-radius: 8px;
      border-left: 4px solid #3b82f6;
    }
    .results {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    th, td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }
    th {
      background: #f1f5f9;
      font-weight: 600;
    }
    .cpp { color: #059669; font-weight: bold; }
    .python { color: #dc2626; font-weight: bold; }
    .ratio { 
      font-size: 24px; 
      font-weight: bold; 
      text-align: center;
      padding: 1.5rem;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border-radius: 12px;
      margin: 1rem 0;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }
    .faster {
      background: #dcfce7 !important;
    }
    .slower {
      background: #fee2e2 !important;
    }
    .auto-running {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <h1>⚡ C++ vs Python Benchmark</h1>
  
  <button id="runBtn">🔄 Run Again</button>
  
  <div id="status" class="status auto-running">
    🚀 Auto-running benchmark... (takes ~10-30 seconds)
  </div>
  
  <div id="results" class="results" style="display: none;">
    <div id="ratio"></div>
    <table>
      <thead>
        <tr>
          <th>Language</th>
          <th>Avg Time</th>
          <th>Iterations/sec</th>
          <th>Runs</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    async function runBenchmark() {
      const btn = document.getElementById('runBtn');
      const status = document.getElementById('status');
      const results = document.getElementById('results');
      const ratioDiv = document.getElementById('ratio');
      const tableBody = document.getElementById('tableBody');

      btn.disabled = true;
      btn.textContent = '⏳ Running...';
      status.style.display = 'block';
      status.classList.add('auto-running');
      results.style.display = 'none';

      try {
        status.textContent = 'Running C++ benchmark...';
        const response = await fetch('/api/bench');
        const data = await response.json();

        status.textContent = 'Processing results...';

        // Calculate iterations per second
        const cppIps = data.cpp.iterations / data.cpp.avg_time;
        const pyIps = data.python.iterations / data.python.avg_time;
        const ratio = (cppIps / pyIps).toFixed(1);

        // Speedup ratio display
        ratioDiv.innerHTML = `<strong>C++ is <span style="font-size: 32px;">${ratio}x</span> faster</strong>`;
        ratioDiv.style.display = 'block';

        // Table rows
        tableBody.innerHTML = `
          <tr class="faster cpp">
            <td><strong>🟦 C++</strong></td>
            <td>${data.cpp.avg_time.toFixed(6)}s</td>
            <td>${Math.round(cppIps).toLocaleString()} ips</td>
            <td>${data.cpp.runs}</td>
          </tr>
          <tr class="slower python">
            <td><strong>🐍 Python</strong></td>
            <td>${data.python.avg_time.toFixed(6)}s</td>
            <td>${Math.round(pyIps).toLocaleString()} ips</td>
            <td>${data.python.runs}</td>
          </tr>
        `;

        results.style.display = 'block';
        status.style.display = 'none';
        btn.textContent = '🔄 Run Again';
      } catch (err) {
        status.textContent = `❌ Error: ${err.message}`;
        status.classList.remove('auto-running');
        btn.textContent = '🚀 Retry';
      }

      btn.disabled = false;
    }

    // AUTO-RUN on page load
    window.addEventListener('load', () => {
      runBenchmark();
    });

    // Manual button click
    document.getElementById('runBtn').addEventListener('click', runBenchmark);
  </script>
</body>
</html>
